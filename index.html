<!DOCTYPE html>
<html>
<head>
    <title>MQTT Pulse Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .relay-box { display: flex; justify-content: space-around; margin: 20px 0; }
        .relay-indicator { padding: 10px; border-radius: 5px; background: #eee; color: #888; font-weight: bold; width: 40%; }
        .active-cw { background: #ffc107; color: #000; animation: blink 1s infinite; }
        .active-ccw { background: #28a745; color: #fff; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .slider { width: 100%; margin: 20px 0; }
    </style>
</head>
<body>

<div class="card">
    <div class="relay-box">
        <div id="cwIndicator" class="relay-indicator">CW OFF</div>
        <div id="ccwIndicator" class="relay-indicator">CCW OFF</div>
    </div>
    <h2>Pulse Dashboard</h2>
    <p>Current Count: <b id="currentPulse">0</b></p>
    <input type="range" class="slider" id="pulseSlider" min="0" max="100" onchange="sendTarget(this.value)">
</div>

<script>
    const client = new Paho.MQTT.Client("93bad3def29641e399de9a7b9c676613.s1.eu.hivemq.cloud", 8884, "web_client");
    
    // MQTT connection same as before...
    client.connect({ userName: "tohits", password: "toh123@TOH", useSSL: true, onSuccess: () => client.subscribe("pulse/status") });

    client.onMessageArrived = (message) => {
        const data = message.payloadString.split(","); // format: [count, achieved, direction]
        document.getElementById("currentPulse").innerText = data[0];
        
        // Update Relay UI based on direction (data[2])
        const dir = parseInt(data[2]);
        document.getElementById("cwIndicator").className = "relay-indicator " + (dir === 1 ? "active-cw" : "");
        document.getElementById("cwIndicator").innerText = (dir === 1 ? "CW ON" : "CW OFF");
        
        document.getElementById("ccwIndicator").className = "relay-indicator " + (dir === 2 ? "active-ccw" : "");
        document.getElementById("ccwIndicator").innerText = (dir === 2 ? "CCW ON" : "CCW OFF");
    };

    function sendTarget(val) {
        let msg = new Paho.MQTT.Message(val);
        msg.destinationName = "pulse/set";
        client.send(msg);
    }
</script>
</body>
</html>
