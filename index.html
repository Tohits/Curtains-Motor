<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Global Position Controller</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at 50% 50%, #0d121f 0%, #05070a 100%);
            --card-bg: rgba(21, 28, 45, 0.7);
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
        }

        body { display: flex; flex-direction: column; align-items: center; min-height: 100vh; background: var(--bg-gradient); color: var(--text-main); padding: 20px; font-family: sans-serif; }
        .container { width: 100%; max-width: 500px; background: rgba(10, 15, 26, 0.65); border: 1px solid rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #fff; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; }
        
        .status-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .status-badge { font-size: 0.65rem; text-align: center; padding: 8px; border-radius: 10px; background: rgba(255,255,255,0.05); }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: var(--danger); }
        .online { background: var(--success); }

        .dashboard { display: flex; gap: 15px; margin-bottom: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 16px; flex: 1; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .value { font-size: 2rem; font-weight: bold; margin-top: 10px; color: var(--primary); }
        
        .relay-panel { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin-bottom: 20px; display: flex; justify-content: space-around; }
        .relay-unit { text-align: center; color: var(--text-muted); font-size: 0.7rem; }
        .led { width: 12px; height: 12px; border-radius: 50%; background: #334155; margin: 0 auto 8px auto; }
        .active { color: var(--success); }
        .active .led { background: var(--success); box-shadow: 0 0 10px var(--success); }

        input[type=range] { width: 100%; margin: 20px 0; }
        .reboot-btn { width: 100%; padding: 12px; border-radius: 12px; border: none; background: #ef4444; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="container">
        <h2>System Control</h2>
        
        <div class="status-container">
            <div class="status-badge">Web<br><span id="webDot" class="dot"></span> <span id="webStatus">Offline</span></div>
            <div class="status-badge">ESP<br><span id="espDot" class="dot"></span> <span id="espStatus">Offline</span></div>
            <div class="status-badge">Next Restart<br><span id="rebootTimer">--:--:--</span></div>
        </div>

        <div class="dashboard">
            <div class="card"><div>Target</div><div id="targetValue" class="value">0%</div></div>
            <div class="card"><div>Current</div><div id="currentValue" class="value">0%</div></div>
        </div>

        <div class="relay-panel">
            <div class="relay-unit" id="r1"><div class="led"></div>R1 FWD</div>
            <div class="relay-unit" id="r2"><div class="led"></div>R2 FWD</div>
            <div class="relay-unit" id="r3"><div class="led"></div>R3 REV</div>
            <div class="relay-unit" id="r4"><div class="led"></div>R4 REV</div>
        </div>

        <input type="range" min="0" max="100" value="0" id="pulseSlider" onchange="sendTarget(this.value)" oninput="updateUI(this.value)">
        
        <button class="reboot-btn" onclick="sendReboot()">Reboot System</button>
    </div>

    <script>
        const client = new Paho.MQTT.Client("93bad3def29641e399de9a7b9c676613.s1.eu.hivemq.cloud", 8884, "web_" + Math.random());
        
        client.onConnectionLost = (e) => { updateWebStatus(false); setTimeout(connect, 5000); };
        
        client.onMessageArrived = (m) => {
            const topic = m.destinationName;
            const payload = m.payloadString;
            
            if (topic === "tohits/current") document.getElementById('currentValue').innerText = payload + "%";
            if (topic === "tohits/target") { document.getElementById('targetValue').innerText = payload + "%"; document.getElementById('pulseSlider').value = payload; }
            if (topic === "tohits/relay") updateRelays(payload);
            if (topic === "tohits/status") updateESPStatus(payload === "online");
            if (topic === "tohits/restart_in") document.getElementById('rebootTimer').innerText = formatTime(parseInt(payload));
        };

        function formatTime(s) {
            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
            return [h, m, sec].map(v => v < 10 ? "0" + v : v).join(":");
        }

        function updateWebStatus(online) {
            document.getElementById('webDot').className = online ? "dot online" : "dot";
            document.getElementById('webStatus').innerText = online ? "Online" : "Offline";
        }

        function updateESPStatus(online) {
            document.getElementById('espDot').className = online ? "dot online" : "dot";
            document.getElementById('espStatus').innerText = online ? "Online" : "Offline";
        }

        function connect() {
            client.connect({ userName: "tohits", password: "toh123@TOH", useSSL: true, onSuccess: () => {
                updateWebStatus(true);
                client.subscribe("tohits/#"); // Subscribe to all topics
            }});
        }

        function updateUI(val) { document.getElementById('targetValue').innerText = val + "%"; }

        function sendTarget(val) { client.send("tohits/target", val.toString()); }

        function sendReboot() {
            if (confirm("Are you sure you want to reboot the ESP system?")) {
                client.send("tohits/command", "REBOOT");
            }
        }

        function updateRelays(state) {
            document.querySelectorAll('.relay-unit').forEach(el => el.classList.remove('active'));
            if (state === "FORWARD") { document.getElementById('r1').classList.add('active'); document.getElementById('r2').classList.add('active'); }
            else if (state === "REVERSE") { document.getElementById('r3').classList.add('active'); document.getElementById('r4').classList.add('active'); }
        }

        connect();
    </script>
</body>
</html>
