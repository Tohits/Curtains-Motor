<!DOCTYPE html>
<html>
<head>
    <title>POSITION COMMAND CENTER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e14; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #151a23; padding: 25px; border-radius: 20px; border: 1px solid #2d3446; width: 350px; text-align: center; }
        h2 { color: #5c9eff; margin-bottom: 20px; font-size: 1.2em; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .box { background: #0b0e14; padding: 10px; border-radius: 12px; font-size: 0.6em; }
        .status-dot { height: 8px; width: 8px; background-color: #ff4d4d; border-radius: 50%; display: inline-block; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #0b0e14; padding: 15px; border-radius: 15px; border: 1px solid #2d3446; }
        .relay-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin: 20px 0; }
        .relay-btn { background: #0b0e14; padding: 10px 5px; border-radius: 10px; font-size: 0.6em; border: 1px solid #2d3446; }
        .active-relay { background: #ff4d4d; color: white; }
        .slider { width: 100%; margin: 20px 0; accent-color: #5c9eff; }
        .reboot-btn { width: 100%; padding: 15px; background: #ff4d4d; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2>POSITION COMMAND CENTER</h2>
    <div class="grid-3">
        <div class="box">CLOUD MQTT<br><span class="status-dot" id="mqttStatus"></span> <span id="mqttTxt">OFF</span></div>
        <div class="box">ESP HARDWARE<br><span class="status-dot" id="espStatus"></span> <span id="espTxt">OFF</span></div>
        <div class="box">NEXT RESTART<br><b id="rebootTimer" style="color:#5c9eff;">--:--:--</b></div>
    </div>
    <div class="grid-2">
        <div class="stat-card">TARGET POS<br><b style="font-size: 1.5em; color: #5c9eff;" id="targetDisplay">0%</b></div>
        <div class="stat-card">CURRENT READ<br><b style="font-size: 1.5em; color: #2ecc71;" id="currentDisplay">0%</b></div>
    </div>
    <div>ACTIVE RELAY MONITORING</div>
    <div class="relay-grid">
        <div id="r1" class="relay-btn">R1 FWD</div><div id="r2" class="relay-btn">R2 FWD</div>
        <div id="r3" class="relay-btn">R3 REV</div><div id="r4" class="relay-btn">R4 REV</div>
    </div>
    <div>COMMAND OUTPUT SLIDER</div>
    <input type="range" class="slider" id="pulseSlider" min="0" max="100" oninput="updateTargetDisplay(this.value)" onchange="sendTarget(this.value)">
    <button class="reboot-btn" onclick="sendReboot()">REBOOT SYSTEM</button>
</div>

<script>
    const client = new Paho.MQTT.Client("93bad3def29641e399de9a7b9c676613.s1.eu.hivemq.cloud", 8884, "web_client");
    
    function updateTargetDisplay(val) { document.getElementById("targetDisplay").innerText = val + "%"; }
    function formatTime(s) { const h = Math.floor(s / 3600); const m = Math.floor((s % 3600) / 60); const sec = s % 60; return `${h}:${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`; }

    client.connect({ userName: "tohits", password: "toh123@TOH", useSSL: true, onSuccess: () => {
        document.getElementById("mqttStatus").style.backgroundColor = "#2ecc71";
        client.subscribe("pulse/status");
    }});

    client.onMessageArrived = (message) => {
        const data = message.payloadString.split(",");
        document.getElementById("espStatus").style.backgroundColor = "#2ecc71";
        document.getElementById("currentDisplay").innerText = data[0] + "%";
        document.getElementById("rebootTimer").innerText = formatTime(parseInt(data[3]));
        
        const dir = parseInt(data[2]);
        document.getElementById("r1").className = "relay-btn " + (dir === 1 ? "active-relay" : "");
        document.getElementById("r2").className = "relay-btn " + (dir === 1 ? "active-relay" : "");
        document.getElementById("r3").className = "relay-btn " + (dir === 2 ? "active-relay" : "");
        document.getElementById("r4").className = "relay-btn " + (dir === 2 ? "active-relay" : "");
    };

    function sendTarget(val) { let msg = new Paho.MQTT.Message(val); msg.destinationName = "pulse/set"; client.send(msg); }
    function sendReboot() { if(confirm("Confirm Reboot?")) { let msg = new Paho.MQTT.Message("REBOOT"); msg.destinationName = "pulse/cmd"; client.send(msg); } }
</script>
</body>
</html>
