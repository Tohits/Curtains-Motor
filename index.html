<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Global Position Controller</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at 50% 50%, #0d121f 0%, #05070a 100%);
            --card-bg: rgba(21, 28, 45, 0.7);
            --card-border: rgba(59, 130, 246, 0.15);
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.35);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.35);
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body { 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-gradient); 
            color: var(--text-main);
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 460px;
            background: rgba(10, 15, 26, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* --- HEADER & STATUS BADGES --- */
        h2 { 
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            text-transform: uppercase;
            background: linear-gradient(to right, #93c5fd, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .meta-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 0 5px;
        }

        #status { 
            font-size: 0.75rem; 
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 6px 12px;
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.4s ease;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            background-color: var(--warning);
            box-shadow: 0 0 8px var(--warning);
        }

        .dot.connected {
            background-color: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }

        .dot.disconnected {
            background-color: var(--danger);
            box-shadow: 0 0 8px var(--danger);
        }

        /* --- DASHBOARD CARDS --- */
        .dashboard { 
            display: flex; 
            gap: 16px; 
            margin-bottom: 30px; 
            width: 100%;
        }

        .card { 
            background: var(--card-bg); 
            padding: 20px 15px; 
            border-radius: 18px; 
            flex: 1;
            border: 1px solid var(--card-border);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
        }

        .card.target-card::before { background: var(--primary); }
        .card.current-card::before { background: var(--success); }

        .card-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            font-weight: 700;
        }

        .value { 
            font-size: 3rem; 
            font-weight: 900; 
            margin-top: 5px; 
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.04em;
        }

        .target { color: var(--primary); text-shadow: 0 0 20px var(--primary-glow); }
        .current { color: var(--success); text-shadow: 0 0 20px var(--success-glow); }

        /* --- DYNAMIC MOTOR STATE BADGE --- */
        #motorState {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        /* --- SLIDER STYLING --- */
        .slider-section {
            width: 100%;
            text-align: left;
            padding: 0 5px;
        }

        .slider-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            display: block;
        }

        .slider-wrapper {
            position: relative;
            width: 100%;
        }

        input[type=range] { 
            -webkit-appearance: none;
            width: 100%; 
            height: 10px;
            border-radius: 100px;
            background: #1e293b;
            outline: none;
            margin: 20px 0;
            transition: background 0.3s;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ffffff;
            border: 4px solid var(--primary);
            cursor: pointer;
            box-shadow: 0 0 15px var(--primary-glow);
            transition: transform 0.15s ease, background-color 0.2s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: var(--primary);
            border-color: #ffffff;
        }

        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(0.95);
        }

        /* --- ANIMATIONS --- */
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="meta-container">
            <h2>Position Command</h2>
            <div id="status">
                <span class="dot" id="statusDot"></span>
                <span id="statusText">Offline</span>
            </div>
        </div>
        
        <div class="dashboard">
            <div class="card target-card">
                <div class="card-title">Target Position</div>
                <div id="targetValue" class="value target">0%</div>
            </div>
            <div class="card current-card">
                <div class="card-title">Current Read</div>
                <div id="currentValue" class="value current">0%</div>
            </div>
        </div>

        <div id="motorState">
            <span>●</span> System Idle
        </div>

        <div class="slider-section">
            <label class="slider-label" for="pulseSlider">Command Output</label>
            <div class="slider-wrapper">
                <input type="range" min="0" max="100" value="0" id="pulseSlider" onchange="sendTarget(this.value)" oninput="updateUI(this.value)">
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // MQTT CONFIGURATION
        // ==========================================
        const mqtt_host = "93bad3def29641e399de9a7b9c676613.s1.eu.hivemq.cloud";
        const mqtt_port = 8884; 
        const mqtt_user = "tohits";
        const mqtt_pass = "toh123@TOH";
        
        const topic_target = "tohits/target";
        const topic_current = "tohits/current";

        const clientID = "web_" + Math.random().toString(16).substring(2, 10);
        const client = new Paho.MQTT.Client(mqtt_host, mqtt_port, clientID);

        let targetVal = 0;
        let currentVal = 0;

        client.onConnectionLost = onConnectionLost;
        client.onMessageArrived = onMessageArrived;

        connectMQTT();

        function connectMQTT() {
            updateStatus("Connecting...", "connecting");
            client.connect({
                userName: mqtt_user,
                password: mqtt_pass,
                useSSL: true,
                onSuccess: onConnect,
                onFailure: onConnectFailure
            });
        }

        // ==========================================
        // MQTT STATUS HANDLERS
        // ==========================================
        function onConnect() {
            updateStatus("Connected", "connected");
            client.subscribe(topic_current);
        }

        function onConnectFailure(e) {
            updateStatus("Retry Failure", "disconnected");
            setTimeout(connectMQTT, 5000);
        }

        function onConnectionLost(responseObject) {
            if (responseObject.errorCode !== 0) {
                updateStatus("Disconnected", "disconnected");
                setTimeout(connectMQTT, 5000);
            }
        }

        // Handles live position changes & updates state labels dynamically
        function onMessageArrived(message) {
            if (message.destinationName === topic_current) {
                currentVal = parseInt(message.payloadString) || 0;
                document.getElementById('currentValue').innerText = currentVal + "%";
                updateSystemState();
            }
        }

        // ==========================================
        // UI & HARDWARE CONTROLS
        // ==========================================
        function updateUI(val) {
            targetVal = parseInt(val);
            document.getElementById('targetValue').innerText = targetVal + "%";
            updateSystemState();
        }

        function sendTarget(val) {
            if (client.isConnected()) {
                let message = new Paho.MQTT.Message(val.toString());
                message.destinationName = topic_target;
                client.send(message);
            }
        }

        // Updates state line: tells you if the motor is actively correcting or locked
        function updateSystemState() {
            const stateEl = document.getElementById("motorState");
            if (targetVal === currentVal) {
                stateEl.innerHTML = `<span style="color: var(--success)">●</span> Position Locked`;
                stateEl.style.color = "var(--text-main)";
            } else {
                stateEl.innerHTML = `<span style="color: var(--warning); animation: pulse 1s infinite">●</span> Motor Driving...`;
                stateEl.style.color = "var(--warning)";
            }
        }

        // Changes the glowing UI Status Dot and Badge colors on the fly
        function updateStatus(text, state) {
            const statusText = document.getElementById("statusText");
            const statusDot = document.getElementById("statusDot");
            
            statusText.innerText = text;
            statusDot.className = "dot"; // Reset classes
            
            if (state === "connected") {
                statusDot.classList.add("connected");
                statusText.style.color = "var(--success)";
            } else if (state === "connecting") {
                statusText.style.color = "var(--warning)";
            } else {
                statusDot.classList.add("disconnected");
                statusText.style.color = "var(--danger)";
            }
        }
    </script>
</body>
</html>
