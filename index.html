<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Global MQTT Controller</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 40px; background-color: #f4f4f9; }
        h2 { color: #333; }
        input[type=range] { width: 90%; max-width: 400px; margin: 20px 0; }
        .dashboard { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 120px; }
        .value { font-size: 2em; font-weight: bold; margin-top: 10px; }
        .target { color: #007BFF; }
        .current { color: #28A745; }
        #status { color: #888; font-size: 0.9em; }
    </style>
</head>
<body>
    <h2>Position Controller</h2>
    <p id="status">Connecting to HiveMQ Cloud...</p>
    
    <div class="dashboard">
        <div class="card">
            <div>Target</div>
            <div id="targetValue" class="value target">100</div>
        </div>
        <div class="card">
            <div>Current</div>
            <div id="currentValue" class="value current">100</div>
        </div>
    </div>

    <p>Move slider to set target position (0 - 100):</p>
    <input type="range" min="0" max="100" value="100" id="pulseSlider" onchange="sendTarget(this.value)" oninput="updateUI(this.value)">

    <script>
        // --- MQTT CONFIGURATION ---
        const mqtt_host = "93bad3def29641e399de9a7b9c676613.s1.eu.hivemq.cloud";
        const mqtt_port = 8884; // Web browsers MUST use 8884 (WebSockets)
        const mqtt_user = "tohits";
        const mqtt_pass = "toh123@TOH";
        
        // Topics
        const topic_target = "tohits/target";
        const topic_current = "tohits/current";

        // Generate a random client ID for the browser
        const clientID = "web_" + Math.random().toString(16).substr(2, 8);
        const client = new Paho.MQTT.Client(mqtt_host, mqtt_port, clientID);

        // Define Callbacks
        client.onConnectionLost = onConnectionLost;
        client.onMessageArrived = onMessageArrived;

        // Connect to HiveMQ
        client.connect({
            userName: mqtt_user,
            password: mqtt_pass,
            useSSL: true,
            onSuccess: onConnect,
            onFailure: function(e) {
                document.getElementById("status").innerText = "Connection failed: " + e.errorMessage;
                document.getElementById("status").style.color = "red";
            }
        });

        function onConnect() {
            document.getElementById("status").innerText = "🟢 Connected to Cloud";
            document.getElementById("status").style.color = "green";
            // Subscribe to the ESP's live pulse feed
            client.subscribe(topic_current);
        }

        function onConnectionLost(responseObject) {
            if (responseObject.errorCode !== 0) {
                document.getElementById("status").innerText = "🔴 Disconnected";
                document.getElementById("status").style.color = "red";
            }
        }

        // When the ESP sends a pulse update, show it on the screen
        function onMessageArrived(message) {
            if(message.destinationName === topic_current) {
                document.getElementById('currentValue').innerText = message.payloadString;
            }
        }

        // Updates the blue box instantly when dragging
        function updateUI(val) {
            document.getElementById('targetValue').innerText = val;
        }

        // Sends the command to the ESP when you release the slider
        function sendTarget(val) {
            if(client.isConnected()) {
                let message = new Paho.MQTT.Message(val.toString());
                message.destinationName = topic_target;
                client.send(message);
                console.log("Sent Target:", val);
            }
        }
    </script>
</body>
</html>
