<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Global Position & Relay Controller</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at 50% 50%, #0d121f 0%, #05070a 100%);
            --card-bg: rgba(21, 28, 45, 0.7);
            --card-border: rgba(59, 130, 246, 0.15);
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.35);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.35);
            --warning: #f59e0b;
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body { 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-gradient); 
            color: var(--text-main);
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: rgba(10, 15, 26, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 { 
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            text-transform: uppercase;
            background: linear-gradient(to right, #93c5fd, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-align: center;
        }

        /* --- STATUS LABELS SYSTEM --- */
        .status-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 25px;
        }

        .status-badge {
            flex: 1;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 8px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .status-badge span.label {
            color: var(--text-muted);
            font-size: 0.65rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot.connected { background-color: var(--success); box-shadow: 0 0 8px var(--success); }
        .dot.warning { background-color: var(--warning); box-shadow: 0 0 8px var(--warning); }
        .dot.disconnected { background-color: var(--danger); box-shadow: 0 0 8px var(--danger); }

        /* --- DISPLAY CARDS --- */
        .dashboard { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 25px; 
        }

        .card { 
            background: var(--card-bg); 
            padding: 16px 12px; 
            border-radius: 16px; 
            flex: 1;
            border: 1px solid var(--card-border);
            text-align: center;
        }

        .card-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            font-weight: 700;
        }

        .value { 
            font-size: 2.4rem; 
            font-weight: 900; 
            margin-top: 5px; 
            font-variant-numeric: tabular-nums;
        }

        .target { color: var(--primary); text-shadow: 0 0 20px var(--primary-glow); }
        .current { color: var(--success); text-shadow: 0 0 20px var(--success-glow); }

        /* --- REALTIME RELAY BOARD --- */
        .relay-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .relay-panel-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            text-align: center;
        }

        .relay-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .relay-unit {
            background: #101726;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 10px 5px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .relay-unit.active {
            background: rgba(16, 185, 129, 0.08);
            border-color: var(--success);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.15);
        }

        .relay-unit .led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #334155;
            margin: 0 auto 6px auto;
            transition: all 0.3s;
        }

        .relay-unit.active .led {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .relay-unit .name {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .relay-unit.active .name {
            color: var(--success);
        }

        /* --- SLIDER --- */
        .slider-section {
            width: 100%;
        }

        .slider-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            display: block;
        }

        input[type=range] { 
            -webkit-appearance: none;
            width: 100%; 
            height: 8px;
            border-radius: 100px;
            background: #1e293b;
            outline: none;
            margin: 15px 0;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #ffffff;
            border: 4px solid var(--primary);
            cursor: pointer;
            box-shadow: 0 0 15px var(--primary-glow);
            transition: transform 0.15s ease, background-color 0.2s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            background: var(--primary);
            border-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Position Command Center</h2>
        
        <div class="status-container">
            <div class="status-badge">
                <span class="label">Cloud MQTT</span>
                <div style="display: flex; align-items: center; gap: 6px; margin-top: 2px;">
                    <span class="dot disconnected" id="webDot"></span>
                    <span id="webStatus" style="color: var(--danger);">Offline</span>
                </div>
            </div>
            <div class="status-badge">
                <span class="label">ESP Hardware</span>
                <div style="display: flex; align-items: center; gap: 6px; margin-top: 2px;">
                    <span class="dot disconnected" id="espDot"></span>
                    <span id="espStatus" style="color: var(--danger);">Offline</span>
                </div>
            </div>
        </div>
        
        <div class="dashboard">
            <div class="card">
                <div class="card-title">Target Pos</div>
                <div id="targetValue" class="value target">0%</div>
            </div>
            <div class="card">
                <div class="card-title">Current Read</div>
                <div id="currentValue" class="value current">0%</div>
            </div>
        </div>

        <div class="relay-panel">
            <div class="relay-panel-title">Active Relay Monitoring</div>
            <div class="relay-grid">
                <div class="relay-unit" id="r1">
                    <div class="led"></div>
                    <div class="name">R1 FWD</div>
                </div>
                <div class="relay-unit" id="r2">
                    <div class="led"></div>
                    <div class="name">R2 FWD</div>
                </div>
                <div class="relay-unit" id="r3">
                    <div class="led"></div>
                    <div class="name">R3 REV</div>
                </div>
                <div class="relay-unit" id="r4">
                    <div class="led"></div>
                    <div class="name">R4 REV</div>
                </div>
            </div>
        </div>

        <div class="slider-section">
            <label class="slider-label" for="pulseSlider">Command Output Slider</label>
            <input type="range" min="0" max="100" value="0" id="pulseSlider" onchange="sendTarget(this.value)" oninput="updateUI(this.value)">
        </div>
    </div>

    <script>
        const mqtt_host = "93bad3def29641e399de9a7b9c676613.s1.eu.hivemq.cloud";
        const mqtt_port = 8884; 
        const mqtt_user = "tohits";
        const mqtt_pass = "toh123@TOH";
        
        const topic_target = "tohits/target";
        const topic_current = "tohits/current";
        const topic_status = "tohits/status";
        const topic_relay = "tohits/relay";

        const clientID = "web_" + Math.random().toString(16).substring(2, 10);
        const client = new Paho.MQTT.Client(mqtt_host, mqtt_port, clientID);

        client.onConnectionLost = onConnectionLost;
        client.onMessageArrived = onMessageArrived;

        connectMQTT();

        function connectMQTT() {
            updateWebStatus("Connecting...", "warning");
            client.connect({
                userName: mqtt_user,
                password: mqtt_pass,
                useSSL: true,
                onSuccess: onConnect,
                onFailure: onConnectFailure
            });
        }

        function onConnect() {
            updateWebStatus("Connected", "connected");
            client.subscribe(topic_current);
            client.subscribe(topic_status);
            client.subscribe(topic_relay);
            client.subscribe(topic_target); // Subscribe to target to sync slider initially
        }

        function onConnectFailure(e) {
            updateWebStatus("Failed", "disconnected");
            setTimeout(connectMQTT, 5000);
        }

        function onConnectionLost(responseObject) {
            updateWebStatus("Offline", "disconnected");
            updateESPStatus("Offline", "disconnected"); 
            setTimeout(connectMQTT, 5000);
        }

        function onMessageArrived(message) {
            const topic = message.destinationName;
            const payload = message.payloadString;

            if (topic === topic_current) {
                document.getElementById('currentValue').innerText = payload + "%";
            } 
            else if (topic === topic_target) {
                document.getElementById('targetValue').innerText = payload + "%";
                document.getElementById('pulseSlider').value = payload;
            }
            else if (topic === topic_status) {
                if (payload === "online") {
                    updateESPStatus("Online", "connected");
                } else {
                    updateESPStatus("Offline", "disconnected");
                    updateRelayVisualization("IDLE"); 
                }
            } 
            else if (topic === topic_relay) {
                updateRelayVisualization(payload);
            }
        }

        function updateUI(val) {
            document.getElementById('targetValue').innerText = val + "%";
        }

        function sendTarget(val) {
            if (client.isConnected()) {
                let message = new Paho.MQTT.Message(val.toString());
                message.destinationName = topic_target;
                message.retained = true; // Retain target so new devices load matching values
                client.send(message);
            }
        }

        function updateRelayVisualization(state) {
            const r1 = document.getElementById("r1");
            const r2 = document.getElementById("r2");
            const r3 = document.getElementById("r3");
            const r4 = document.getElementById("r4");

            r1.classList.remove("active");
            r2.classList.remove("active");
            r3.classList.remove("active");
            r4.classList.remove("active");

            if (state === "FORWARD") {
                r1.classList.add("active");
                r2.classList.add("active");
            } 
            else if (state === "REVERSE") {
                r3.classList.add("active");
                r4.classList.add("active");
            }
        }

        function updateWebStatus(text, state) {
            const label = document.getElementById("webStatus");
            const dot = document.getElementById("webDot");
            label.innerText = text;
            dot.className = "dot " + state;
            
            if (state === "connected") label.style.color = "var(--success)";
            else if (state === "warning") label.style.color = "var(--warning)";
            else label.style.color = "var(--danger)";
        }

        function updateESPStatus(text, state) {
            const label = document.getElementById("espStatus");
            const dot = document.getElementById("espDot");
            label.innerText = text;
            dot.className = "dot " + state;
            
            if (state === "connected") label.style.color = "var(--success)";
            else label.style.color = "var(--danger)";
        }
    </script>
</body>
</html>
